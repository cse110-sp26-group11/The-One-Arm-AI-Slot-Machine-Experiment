<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HYPE MACHINE | Silicon Valley Slot Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1 class="glitch-text" data-text="AI HYPE MACHINE">AI HYPE MACHINE</h1>
        </header>

        <div id="slot-machine">
            <div id="reel-container">
                <div class="reel" id="reel-1">
                    <div class="reel-strip" id="strip-1"></div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="reel-strip" id="strip-2"></div>
                </div>
                <div class="reel" id="reel-3">
                    <div class="reel-strip" id="strip-3"></div>
                </div>
                <div id="win-line"></div>
            </div>
        </div>

        <div id="dashboard">
            <div id="stats">
                <div class="stat-item">
                    <label>COMPUTE</label>
                    <span id="balance" class="stat-value">500</span>
                </div>
                <div class="stat-item">
                    <label>HYPE</label>
                    <span id="hype-level" class="stat-value">0%</span>
                </div>
                <div class="stat-item">
                    <label>BET</label>
                    <div class="bet-selector">
                        <button id="bet-down" class="bet-btn" title="Decrease Bet">-</button>
                        <span id="current-bet" class="stat-value">10</span>
                        <button id="bet-up" class="bet-btn" title="Increase Bet">+</button>
                    </div>
                </div>
            </div>

            <div id="hyperparameters">
                <label>MODEL ALIGNMENT (ODDS)</label>
                <div class="alignment-selector">
                    <button class="alignment-btn active" data-alignment="balanced">BALANCED</button>
                    <button class="alignment-btn" data-alignment="growth">VC GROWTH</button>
                    <button class="alignment-btn" data-alignment="safety">SAFETY (0% RISK)</button>
                    <button class="alignment-btn" data-alignment="chaos">HAL-9000</button>
                </div>
            </div>

            <div id="controls">
                <button id="spin-button">BURN TOKENS</button>
                <div class="funding-actions">
                    <button id="vc-button">SECURE SEED ROUND</button>
                    <button id="info-button" title="View Payouts">PAYTABLE</button>
                </div>
            </div>

            <div id="status-log" title="System Logs">
                <p class="status-entry">> Initializing inference engine...</p>
                <p class="status-entry">> Scraping web for training data...</p>
                <p class="status-entry">> Context window at 128k.</p>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="hidden">
        <div id="paytable-modal" class="modal-content hidden">
            <h2>HYPE PAYOUTS</h2>
            <div id="paytable-grid"></div>
            <p class="footer-note">* Multipliers applied to CURRENT BET.</p>
            <button class="close-modal">DISMISS</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
