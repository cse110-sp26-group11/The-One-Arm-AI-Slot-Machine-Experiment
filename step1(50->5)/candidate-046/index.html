<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Burner 3000 | AI Hallucination Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="crt">
    <div class="terminal-overlay"></div>
    <div class="container">
        <header>
            <h1 class="glitch" data-text="TOKEN_BURNER_3000">TOKEN_BURNER_3000</h1>
            <p class="status-line">> SYSTEM: INITIALIZING HYPE_PROTOCOL...</p>
        </header>

        <main class="slot-machine">
            <div class="stats-bar">
                <div class="stat">
                    <span class="label">COMPUTE_BUDGET:</span>
                    <span id="tokens" class="value">1000</span>
                </div>
                <div class="stat">
                    <span class="label">INFERENCE_COST:</span>
                    <span id="bet" class="value">10</span>
                </div>
                <div class="stat">
                    <span class="label">LAST_HARVEST:</span>
                    <span id="last-win" class="value">0</span>
                </div>
            </div>

            <div class="reels-container">
                <div class="reel" id="reel-0">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel" id="reel-1">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="reel-strip"></div>
                </div>
                <div class="win-line"></div>
            </div>

            <div class="message-center">
                <p id="ai-commentary">> Ready for inference...</p>
            </div>

            <div class="controls">
                <div class="bet-controls">
                    <button id="bet-minus" class="btn small">-</button>
                    <span class="btn-label">ADJUST_EPSILON</span>
                    <button id="bet-plus" class="btn small">+</button>
                </div>
                
                <button id="spin-btn" class="btn large">RUN_INFERENCE</button>
                
                <button id="fine-tune-btn" class="btn large disabled" disabled>FINE_TUNE_WIN</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 NEURAL_SCAM_CORP | "Synthesizing your future, one token at a time."</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
