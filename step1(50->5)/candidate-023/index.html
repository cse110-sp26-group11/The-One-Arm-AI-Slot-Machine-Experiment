<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Token Burner - Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>AI TOKEN <span class="accent">BURNER</span></h1>
            <p class="subtitle">Venture Capital Simulator v1.0</p>
        </header>

        <main id="slot-machine">
            <div id="display-panel">
                <div class="stat">
                    <span class="label">HYPE TOKENS</span>
                    <span id="token-count" class="value">100</span>
                </div>
                <div class="stat">
                    <span class="label">EQUITY</span>
                    <span id="equity-pct" class="value">0%</span>
                </div>
            </div>

            <div id="reels-container">
                <div class="reel" id="reel-1">
                    <div class="reel-content">🤖</div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="reel-content">🤖</div>
                </div>
                <div class="reel" id="reel-3">
                    <div class="reel-content">🤖</div>
                </div>
            </div>

            <div id="controls">
                <button id="spin-btn">BURN COMPUTE (5 Tokens)</button>
            </div>
        </main>

        <footer id="console">
            <div id="status-log">
                <p>> System initialized.</p>
                <p>> Waiting for series A funding...</p>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
