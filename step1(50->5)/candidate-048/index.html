<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Dream Engine - Satirical AI Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AGI DREAM ENGINE</h1>
            <p class="tagline">Mining tokens, training futures (mostly yours).</p>
        </header>

        <main>
            <div class="slot-machine">
                <div class="reels">
                    <div class="reel" id="reel1">🤖</div>
                    <div class="reel" id="reel2">⚡</div>
                    <div class="reel" id="reel3">🧠</div>
                </div>
                
                <div class="status-panel">
                    <div class="status-display">
                        <span class="label">MODEL STATUS:</span>
                        <span id="model-status">IDLE (AWAITING PROMPT)</span>
                    </div>
                    <div class="balance-display">
                        <span class="label">TOKEN BALANCE:</span>
                        <span id="token-balance">1000</span>
                    </div>
                </div>

                <div class="controls">
                    <button id="spin-btn">SPIN (10 TOKENS)</button>
                </div>
            </div>
        </main>

        <footer>
            <p>"Winning is just a high-confidence hallucination."</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
