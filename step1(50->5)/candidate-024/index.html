<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great AI Token Siphon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>The Great AI Token Siphon</h1>
            <p class="subtitle">Prompt Engineering Casino & Compute Burner</p>
        </header>

        <main>
            <section class="stats-panel">
                <div class="stat-item">
                    <span class="label">Compute Tokens:</span>
                    <span id="token-balance" class="value">1,000,000</span>
                </div>
                <div class="stat-item">
                    <span class="label">Inference Cost:</span>
                    <span class="value">32,768</span>
                </div>
            </section>

            <section class="slot-machine">
                <div class="reel-container" id="reel-0">
                    <div class="reel-strip" id="strip-0">
                        <!-- Symbols injected by JS -->
                    </div>
                </div>
                <div class="reel-container" id="reel-1">
                    <div class="reel-strip" id="strip-1">
                        <!-- Symbols injected by JS -->
                    </div>
                </div>
                <div class="reel-container" id="reel-2">
                    <div class="reel-strip" id="strip-2">
                        <!-- Symbols injected by JS -->
                    </div>
                </div>
            </section>

            <section class="chat-interface">
                <div id="status-message" class="status-message">Ready to generate intelligence...</div>
                <div class="input-area">
                    <input type="text" placeholder="Type a prompt to 'engineer' the outcome..." id="prompt-input">
                    <button id="spin-button">Generate Response</button>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Neural Gamble Corp. "We're almost at AGI!"</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
